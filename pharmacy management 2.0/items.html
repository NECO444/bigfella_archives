<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Items - Pharmacy Management System</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .items-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: white;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #0ea5a5;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .item-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      transition: all 0.3s;
    }

    .item-card:hover {
      box-shadow: 0 4px 12px rgba(14, 165, 165, 0.1);
      border-color: #0ea5a5;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .item-name {
      font-weight: 600;
      font-size: 16px;
      color: #0ea5a5;
    }

    .category-badge {
      background: #0ea5a5;
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .item-details {
      font-size: 13px;
      margin-bottom: 12px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #64748b;
    }

    .detail-value {
      font-weight: 600;
      color: #1e293b;
    }

    .stock-indicator {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .stock-high {
      background: #dcfce7;
      color: #166534;
    }

    .stock-low {
      background: #fef3c7;
      color: #92400e;
    }

    .stock-out {
      background: #fee2e2;
      color: #991b1b;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .item-actions button {
      flex: 1;
      padding: 8px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-edit-item {
      background: #0ea5a5;
      color: white;
    }

    .btn-edit-item:hover {
      background: #0d8a8a;
    }

    .btn-delete-item {
      background: #ef4444;
      color: white;
    }

    .btn-delete-item:hover {
      background: #dc2626;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 8px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 16px;
    }

    .modal-header h2 {
      margin: 0;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-buttons button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    .filter-section {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .filter-section input,
    .filter-section select {
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
    }

    .filter-section input {
      flex: 1;
    }

    .no-items {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">💊</div>
        <div class="sidebar-title">PharmaCare</div>
      </div>
      
      <nav>
        <ul class="nav-menu">
          <li class="nav-item">
            <a href="dashboard.html" class="nav-link">
              <span class="nav-icon"></span>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="inventory.html" class="nav-link">
              <span class="nav-icon"></span>
              <span>Medicines</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="items.html" class="nav-link active">
              <span class="nav-icon"></span>
              <span>Items</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="sales.html" class="nav-link">
              <span class="nav-icon"></span>
              <span>Sales & Billing</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="customers.html" class="nav-link">
              <span class="nav-icon"></span>
              <span>Customers</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="prescriptions.html" class="nav-link">
              <span class="nav-icon"></span>
              <span>Prescriptions</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="reports.html" class="nav-link">
              <span class="nav-icon"></span>
              <span>Reports</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="settings.html" class="nav-link">
              <span class="nav-icon"></span>
              <span>Settings</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Navbar -->
      <nav class="navbar">
        <div class="navbar-left">
          <div class="navbar-title">
            <h2>Items Inventory</h2>
          </div>
        </div>

        <div class="navbar-right">
          <div class="navbar-item notification-badge">
            <span></span>
            </span>
          </div>
          <div class="user-profile">
            <div class="user-avatar">JD</div>
            <div class="user-info">
              <p style="font-weight: 500;">John Doe</p>
              <p>Pharmacist</p>
            </div>
          </div>
        </div>
      </nav>

      <!-- Page Content -->
      <div class="content">
        <div class="page-header">
          <h1>Items Management</h1>
        </div>

        <!-- Statistics -->
        <div class="items-stats">
          <div class="stat-box">
            <div class="stat-label">Total Items</div>
            <div class="stat-value" id="totalItems">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Total Value</div>
            <div class="stat-value" id="totalValue">MK 0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Low Stock</div>
            <div class="stat-value" id="lowStockCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Out of Stock</div>
            <div class="stat-value" id="outOfStockCount">0</div>
          </div>
        </div>

        <!-- Filter and Add Button -->
        <div class="filter-section">
          <input type="text" id="searchItems" placeholder="Search items by name...">
          <select id="filterCategory">
            <option value="">All Categories</option>
            <option value="First Aid">First Aid</option>
            <option value="Medical Equipment">Medical Equipment</option>
            <option value="OTC Products">OTC Products</option>
            <option value="Hygiene">Hygiene</option>
          </select>
          <button class="btn btn-primary" onclick="openAddItemModal()">
            ➕ Add Item
          </button>
        </div>

        <!-- Items Grid -->
        <div id="itemsContainer"></div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Item Modal -->
  <div class="modal-overlay" id="itemModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Item</h2>
        <button class="modal-close" onclick="closeItemModal()">✕</button>
      </div>

      <form id="itemForm" onsubmit="saveItem(event)">
        <div class="form-group">
          <label for="itemName">Item Name *</label>
          <input type="text" id="itemName" placeholder="e.g., Sterile Bandages" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="itemCategory">Category *</label>
            <select id="itemCategory" required>
              <option value="">Select category...</option>
              <option value="First Aid">First Aid</option>
              <option value="Medical Equipment">Medical Equipment</option>
              <option value="OTC Products">OTC Products</option>
              <option value="Hygiene">Hygiene</option>
            </select>
          </div>

          <div class="form-group">
            <label for="itemSupplier">Supplier</label>
            <input type="text" id="itemSupplier" placeholder="Supplier name">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="itemQuantity">Quantity *</label>
            <input type="number" id="itemQuantity" placeholder="0" min="0" required>
          </div>

          <div class="form-group">
            <label for="itemPrice">Price (MK) *</label>
            <input type="number" id="itemPrice" placeholder="0.00" step="0.01" min="0" required>
          </div>
        </div>

        <div class="form-group">
          <label for="itemDescription">Description</label>
          <textarea id="itemDescription" placeholder="Item description..."></textarea>
        </div>

        <div class="modal-buttons">
          <button type="button" class="btn btn-secondary" onclick="closeItemModal()">Cancel</button>
          <button type="submit" class="btn btn-primary"> Save Item</button>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/database.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    let editingItemId = null;

    function loadItems() {
      const items = db.getItems();
      const lowStockItems = db.getLowStockItems(10);
      const outOfStockItems = db.getOutOfStockItems();
      const totalValue = items.reduce((sum, item) => sum + (item.quantity * item.price), 0);

      document.getElementById('totalItems').textContent = items.length;
      document.getElementById('totalValue').textContent = 'MK ' + totalValue.toFixed(2);
      document.getElementById('lowStockCount').textContent = lowStockItems.length;
      document.getElementById('outOfStockCount').textContent = outOfStockItems.length;

      displayItems();
    }

    function displayItems() {
      const searchTerm = document.getElementById('searchItems').value.toLowerCase();
      const categoryFilter = document.getElementById('filterCategory').value;
      const items = db.getItems();

      let filtered = items.filter(item => {
        const matchesSearch = !searchTerm || item.name.toLowerCase().includes(searchTerm);
        const matchesCategory = !categoryFilter || item.category === categoryFilter;
        return matchesSearch && matchesCategory;
      });

      const container = document.getElementById('itemsContainer');

      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-items">📭 No items found.</div>';
        return;
      }

      container.innerHTML = '<div class="items-grid">' + filtered.map(item => {
        let stockClass = 'stock-high';
        if (item.quantity === 0) stockClass = 'stock-out';
        else if (item.quantity <= 10) stockClass = 'stock-low';

        const stockText = item.quantity === 0 ? 'OUT OF STOCK' : 
                         item.quantity <= 10 ? 'LOW STOCK' : 'IN STOCK';

        return `
          <div class="item-card">
            <div class="item-header">
              <div class="item-name">${item.name}</div>
              <span class="category-badge">${item.category}</span>
            </div>

            <div class="item-details">
              <div class="detail-row">
                <span class="detail-label">Price:</span>
                <span class="detail-value">MK ${item.price.toFixed(2)}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Quantity:</span>
                <span class="detail-value">${item.quantity} units</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Total Value:</span>
                <span class="detail-value">MK ${(item.quantity * item.price).toFixed(2)}</span>
              </div>
              ${item.supplier ? `
              <div class="detail-row">
                <span class="detail-label">Supplier:</span>
                <span class="detail-value">${item.supplier}</span>
              </div>
              ` : ''}
              ${item.description ? `
              <div class="detail-row">
                <span class="detail-label">Description:</span>
                <span class="detail-value">${item.description}</span>
              </div>
              ` : ''}
            </div>

            <div style="margin: 12px 0;">
              <span class="stock-indicator ${stockClass}">${stockText}</span>
            </div>

            <div class="item-actions">
              <button class="btn-edit-item" onclick="editItem(${item.id})"> Edit</button>
              <button class="btn-delete-item" onclick="deleteItem(${item.id})"> Delete</button>
            </div>
          </div>
        `;
      }).join('') + '</div>';
    }

    function openAddItemModal() {
      editingItemId = null;
      document.getElementById('modalTitle').textContent = 'Add New Item';
      document.getElementById('itemForm').reset();
      document.getElementById('itemModal').classList.add('show');
    }

    function closeItemModal() {
      document.getElementById('itemModal').classList.remove('show');
      editingItemId = null;
    }

    function editItem(itemId) {
      const item = db.getItemById(itemId);
      if (!item) return;

      editingItemId = itemId;
      document.getElementById('modalTitle').textContent = 'Edit Item';
      
      document.getElementById('itemName').value = item.name;
      document.getElementById('itemCategory').value = item.category;
      document.getElementById('itemSupplier').value = item.supplier || '';
      document.getElementById('itemQuantity').value = item.quantity;
      document.getElementById('itemPrice').value = item.price;
      document.getElementById('itemDescription').value = item.description || '';

      document.getElementById('itemModal').classList.add('show');
    }

    function saveItem(event) {
      event.preventDefault();

      const name = document.getElementById('itemName').value.trim();
      const category = document.getElementById('itemCategory').value;
      const supplier = document.getElementById('itemSupplier').value.trim();
      const quantity = parseInt(document.getElementById('itemQuantity').value);
      const price = parseFloat(document.getElementById('itemPrice').value);
      const description = document.getElementById('itemDescription').value.trim();

      if (!name || !category || quantity < 0 || price < 0) {
        showNotification('❌ Please fill in all required fields correctly', 'error');
        return;
      }

      const itemData = {
        name,
        category,
        supplier,
        quantity,
        price,
        description
      };

      if (editingItemId) {
        db.updateItem(editingItemId, itemData);
        showNotification('✅ Item updated successfully!', 'success');
      } else {
        db.addItem(itemData);
        showNotification('✅ Item added successfully!', 'success');
      }

      closeItemModal();
      loadItems();
    }

    function deleteItem(itemId) {
      if (confirm('Are you sure you want to delete this item?')) {
        db.deleteItem(itemId);
        showNotification('✅ Item deleted successfully!', 'success');
        loadItems();
      }
    }

    // Event listeners
    document.getElementById('searchItems').addEventListener('input', displayItems);
    document.getElementById('filterCategory').addEventListener('change', displayItems);

    // Load items on page load
    document.addEventListener('DOMContentLoaded', loadItems);
  </script>
</body>
</html>
